name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, build
        run: pnpm turbo run lint typecheck build

      - name: Validate token contrast (WCAG AA)
        run: pnpm --filter @qeetrix/tokens validate

      - name: Build Storybook
        run: pnpm --filter @qeetrix/docs build-storybook

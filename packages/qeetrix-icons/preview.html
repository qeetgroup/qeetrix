<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Qeetrix Icons — Preview</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #111111;
    --muted: #666666;
    --border: #e5e5e5;
    --hover: #f0f0f0;
    --icon-size: 24px;
    --icon-color: #111111;
  }
  body.dark {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --text: #e5e5e5;
    --muted: #888888;
    --border: #2a2a2a;
    --hover: #222222;
    --icon-color: #e5e5e5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
  .subtitle code { background: var(--card); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .controls {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 24px;
    position: sticky; top: 16px; z-index: 10;
  }
  .controls label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .group { display: flex; gap: 4px; }
  button {
    padding: 6px 12px; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: var(--hover); }
  button.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  input[type="color"] {
    width: 36px; height: 28px; padding: 0; border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; background: transparent;
  }
  .swatches { display: flex; gap: 4px; }
  .swatch {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 1px solid var(--border);
  }
  h2 {
    font-size: 12px; margin: 28px 0 10px; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); font-weight: 600;
  }
  table {
    width: 100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); }
  th {
    font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); font-weight: 600; background: var(--bg);
  }
  th:first-child, td:first-child {
    text-align: left;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; padding-left: 20px; width: 160px;
  }
  th .corner { display: block; font-weight: 400; font-size: 9px; opacity: 0.6; margin-top: 2px; }
  .icon-slot {
    display: inline-block;
    width: var(--icon-size);
    height: var(--icon-size);
    color: var(--icon-color);
    vertical-align: middle;
  }
  .icon-slot svg, .icon-slot img { width: 100%; height: 100%; display: block; }
  body.dark .icon-slot img { filter: invert(1); }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--hover); }
  .notice {
    padding: 10px 14px; background: #fef3c7; color: #78350f;
    border: 1px solid #fcd34d; border-radius: 6px; margin-bottom: 16px;
    font-size: 13px; display: none;
  }
  body.dark .notice { background: #422006; color: #fde68a; border-color: #78350f; }
</style>
</head>
<body>

<h1>Qeetrix Icons</h1>
<p class="subtitle">Live color preview. For full color reactivity, serve via <code>python3 -m http.server</code> or open in Firefox (Chrome blocks file:// fetch).</p>

<div id="notice" class="notice">⚠️ Live color change is disabled — your browser blocks file:// fetch. Run a local server or use Firefox.</div>

<div class="controls">
  <label>Size</label>
  <div class="group">
    <button data-size="20">20</button>
    <button data-size="24" class="active">24</button>
    <button data-size="32">32</button>
    <button data-size="48">48</button>
  </div>
  <label>Color</label>
  <input type="color" id="iconColor" value="#111111">
  <div class="swatches">
    <span class="swatch" data-color="#111111" style="background:#111111"></span>
    <span class="swatch" data-color="#3b82f6" style="background:#3b82f6"></span>
    <span class="swatch" data-color="#10b981" style="background:#10b981"></span>
    <span class="swatch" data-color="#f59e0b" style="background:#f59e0b"></span>
    <span class="swatch" data-color="#ef4444" style="background:#ef4444"></span>
    <span class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></span>
  </div>
  <label>Background</label>
  <input type="color" id="bgColor" value="#fafafa">
  <label>Theme</label>
  <div class="group">
    <button data-theme="light" class="active">Light</button>
    <button data-theme="dark">Dark</button>
  </div>
</div>

<div id="content"></div>

<script>
  const STYLES = ['outline', 'filled', 'duotone'];
  const CORNERS = ['rounded', 'sharp'];
  const VARIANTS = STYLES.flatMap(s => CORNERS.map(c => ({ style: s, corner: c })));

  const CATEGORIES = {
    arrow: [
      'arrow-up', 'arrow-down', 'arrow-left', 'arrow-right',
      'arrow-up-right', 'arrow-up-left', 'arrow-down-right', 'arrow-down-left',
      'arrow-left-right', 'arrow-up-down',
      'arrows-expand', 'arrows-collapse',
      'refresh', 'rotate-cw', 'rotate-ccw', 'sync',
      'arrow-uturn-up', 'arrow-uturn-down',
      'arrow-up-to-line', 'arrow-down-to-line', 'arrow-left-to-line', 'arrow-right-to-line',
      'arrow-up-from-line', 'arrow-down-from-line', 'arrow-left-from-line', 'arrow-right-from-line',
      'corner-up-right', 'corner-up-left', 'corner-down-right', 'corner-down-left',
      'corner-left-up', 'corner-left-down',
      'arrow-up-circle', 'arrow-down-circle', 'arrow-left-circle', 'arrow-right-circle',
      'caret-up', 'caret-down', 'caret-left', 'caret-right',
      'triangle-up', 'triangle-down', 'triangle-left', 'triangle-right',
      'reply', 'forward', 'send', 'external-link',
      'chevrons-up', 'chevrons-down', 'chevrons-left', 'chevrons-right',
      'chevrons-up-down', 'chevrons-left-right',
      'arrow-up-square', 'arrow-down-square', 'arrow-left-square', 'arrow-right-square',
      'arrow-up-left-down-right', 'arrow-up-right-down-left',
      'flip-horizontal', 'flip-vertical',
      'merge', 'split',
      'enter', 'exit',
      'trending-up', 'trending-down', 'move',
    ],
    media: [
      'play', 'pause', 'stop', 'play-circle',
      'fast-forward', 'rewind', 'skip-forward', 'skip-back',
      'eject', 'shuffle', 'repeat', 'replay',
      'volume', 'volume-mute', 'mic', 'mic-off',
      'camera', 'video', 'image', 'music',
      'headphones', 'podcast', 'playlist', 'radio',
    ],
    user: [
      'user', 'users', 'profile',
      'user-plus', 'user-minus', 'user-check', 'user-x',
      'user-circle', 'user-square', 'id-card', 'contact',
    ],
    file: [
      'file', 'file-text', 'file-plus', 'file-minus',
      'folder', 'folder-open', 'folder-plus', 'folder-minus',
      'download', 'upload', 'cloud', 'cloud-upload',
      'archive', 'paperclip', 'trash', 'copy',
    ],
  };

  const root = document.getElementById('content');
  for (const [category, icons] of Object.entries(CATEGORIES)) {
    const h2 = document.createElement('h2');
    h2.textContent = category + ' — ' + icons.length + ' icons × ' + VARIANTS.length + ' variants';
    root.appendChild(h2);

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Icon</th>' + VARIANTS.map(v =>
      '<th>' + v.style + '<span class="corner">' + v.corner + '</span></th>'
    ).join('') + '</tr>';
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (const icon of icons) {
      const tr = document.createElement('tr');
      const cells = VARIANTS.map(v => {
        const src = 'svgs/' + category + '/' + v.style + '/' + v.corner + '/' + icon + '.svg';
        const alt = icon + ' ' + v.style + ' ' + v.corner;
        return '<td><span class="icon-slot" data-src="' + src + '" data-alt="' + alt + '"></span></td>';
      }).join('');
      tr.innerHTML = '<td>' + icon + '</td>' + cells;
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    root.appendChild(table);
  }

  // Lazy-load SVGs inline so currentColor responds to CSS
  let fetchFailed = false;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(async (entry) => {
      if (!entry.isIntersecting) return;
      const slot = entry.target;
      observer.unobserve(slot);
      try {
        const res = await fetch(slot.dataset.src);
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        slot.innerHTML = text;
      } catch (e) {
        // Fallback: <img> — color picker won't affect these
        slot.innerHTML = '<img src="' + slot.dataset.src + '" alt="' + (slot.dataset.alt || '') + '" loading="lazy">';
        if (!fetchFailed) {
          fetchFailed = true;
          document.getElementById('notice').style.display = 'block';
        }
      }
    });
  }, { rootMargin: '400px' });

  document.querySelectorAll('.icon-slot').forEach(slot => observer.observe(slot));

  // Size selector
  document.querySelectorAll('button[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.documentElement.style.setProperty('--icon-size', btn.dataset.size + 'px');
      document.querySelectorAll('button[data-size]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Theme toggle
  document.querySelectorAll('button[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => {
      const isDark = btn.dataset.theme === 'dark';
      document.body.classList.toggle('dark', isDark);
      document.querySelectorAll('button[data-theme]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Reset user color overrides so theme defaults take effect
      document.body.style.removeProperty('--icon-color');
      document.body.style.removeProperty('--bg');
      document.getElementById('iconColor').value = isDark ? '#e5e5e5' : '#111111';
      document.getElementById('bgColor').value = isDark ? '#0d0d0d' : '#fafafa';
    });
  });

  // Color picker — set on body (inline) so it overrides body.dark CSS rule via specificity
  document.getElementById('iconColor').addEventListener('input', e => {
    document.body.style.setProperty('--icon-color', e.target.value);
  });
  document.getElementById('bgColor').addEventListener('input', e => {
    document.body.style.setProperty('--bg', e.target.value);
  });

  // Color swatches — quick-pick
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      const color = sw.dataset.color;
      document.body.style.setProperty('--icon-color', color);
      document.getElementById('iconColor').value = color;
    });
  });
</script>

</body>
</html>

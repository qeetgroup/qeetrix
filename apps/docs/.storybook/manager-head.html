<!--
  Loads the Qeet brand faces into the Storybook *chrome* (sidebar / toolbars),
  which renders outside the preview iframe and so doesn't pick up the design
  system's @font-face from @qeetrix/ui/styles.css. The woff2 are staged in
  ./public/fonts and served from the static root. Falls back to system type if a
  face fails to load — purely a cosmetic uplift, no behavioural dependency.
-->
<style>
  @font-face {
    font-family: "Cal Sans Display";
    src: url("/fonts/CalSansUI-GeoRegular.woff2") format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "Cal Sans Display";
    src: url("/fonts/CalSansUI-GeoSemiBold.woff2") format("woff2");
    font-weight: 600;
    font-display: swap;
  }
  @font-face {
    font-family: "Cal Sans Display";
    src: url("/fonts/CalSansUI-GeoBold.woff2") format("woff2");
    font-weight: 700;
    font-display: swap;
  }
  @font-face {
    font-family: "Cal Sans Text";
    src: url("/fonts/CalSansText-Regular.woff2") format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "Cal Sans Text";
    src: url("/fonts/CalSansText-Medium.woff2") format("woff2");
    font-weight: 500;
    font-display: swap;
  }
  @font-face {
    font-family: "Cal Sans Text";
    src: url("/fonts/CalSansText-SemiBold.woff2") format("woff2");
    font-weight: 600;
    font-display: swap;
  }
  @font-face {
    font-family: "Fira Code";
    src: url("/fonts/FiraCode-Regular.ttf") format("truetype");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "Fira Code";
    src: url("/fonts/FiraCode-Medium.ttf") format("truetype");
    font-weight: 500;
    font-display: swap;
  }
  @font-face {
    font-family: "Fira Code";
    src: url("/fonts/FiraCode-SemiBold.ttf") format("truetype");
    font-weight: 600;
    font-display: swap;
  }

  /* Constrain the sidebar brand logo — the source SVG has no intrinsic
     width/height (viewBox 1254×1254), so it renders oversized otherwise. */
  img[src*="qeet-logo"] {
    height: 26px !important;
    width: auto !important;
  }
</style>
